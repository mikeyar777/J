<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="gravity: -9.8; debug: false">
      
      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.5" position="5 10 5"></a-entity>

      <a-entity id="rig" position="0 1 5">
        <a-camera id="camera" look-controls></a-camera>
        <a-entity id="left-hand" oculus-touch-controls="hand: left"></a-entity>
        <a-entity id="right-hand" oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane class="clickable" static-body 
               rotation="-90 0 0" width="100" height="100" 
               color="#333" src="https://cdn.aframe.io/a-blast/assets/images/floor.png" repeat="50 50">
      </a-plane>

      <a-entity id="interrogation-room" position="0 0 -10">
        <a-box static-body position="0 2.5 -5" width="10" height="5" depth="0.5" color="#555"></a-box>
        <a-box static-body position="-5 2.5 0" width="0.5" height="5" depth="10" color="#444"></a-box>
        <a-box static-body position="5 2.5 0" width="0.5" height="5" depth="10" color="#444"></a-box>
        <a-box static-body position="0 5 0" width="10" height="0.5" depth="10" color="#222"></a-box>
        
        <a-box static-body position="0 0.5 0" width="2" height="1" depth="1" color="#111"></a-box>
        <a-box static-body position="0 0.4 1.5" width="0.6" height="0.8" depth="0.6" color="#000"></a-box>
      </a-entity>

      <a-entity id="climbing-zone">
        <a-box class="clickable" static-body position="-8 4 -5" width="2" height="8" depth="2" color="#777"></a-box>
        <a-box class="clickable" static-body position="8 3 -12" width="2" height="6" depth="2" color="#777"></a-box>
        <a-box class="clickable" static-body position="-5 6 -20" width="3" height="12" depth="3" color="#666"></a-box>
        <a-box class="clickable" static-body position="5 5 -25" width="2" height="10" depth="2" color="#666"></a-box>
      </a-entity>

      <a-box static-body position="0 10 -50" width="100" height="20" depth="1" color="#111" opacity="0.5"></a-box>
      <a-box static-body position="0 10 50" width="100" height="20" depth="1" color="#111" opacity="0.5"></a-box>
      <a-box static-body position="-50 10 0" width="1" height="20" depth="100" color="#111" opacity="0.5"></a-box>
      <a-box static-body position="50 10 0" width="1" height="20" depth="100" color="#111" opacity="0.5"></a-box>

      <a-sky color="#87CEEB"></a-sky>

    </a-scene>
  </body>
</html>
