<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Gorilla VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-move', {
        init: function () {
          this.el.addEventListener('click', (evt) => {
            const rig = document.querySelector('#rig');
            const camera = document.querySelector('#camera');
            const dir = new THREE.Vector3();
            
            // Get direction from the camera
            camera.object3D.getWorldDirection(dir);
            
            // STOP SPINNING: We reset angular velocity every time you move
            if (rig.body) {
                rig.body.angularVelocity.set(0, 0, 0); 
                rig.body.velocity.set(-dir.x * 8, 5, -dir.z * 8);
            }
          });
        }
      });
    </script>
</head>
<body style="margin: 0; background: #87CEEB;">

    <a-scene physics="gravity: -9.8; debug: false">
        
        <a-entity light="type: ambient; intensity: 0.9"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="1 10 1"></a-entity>

        <a-entity id="rig" position="0 1 0" dynamic-body="mass: 1; shape: sphere; sphereRadius: 0.5; fixedRotation: true">
            <a-camera id="camera" wasd-controls="enabled: false" look-controls="pointerLockEnabled: true">
                <a-cursor color="black" raycaster="objects: .clickable" gorilla-move></a-cursor>
            </a-camera>

            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
        </a-entity>

        <a-plane class="clickable" static-body rotation="-90 0 0" width="500" height="500" color="#4CAF50"></a-plane>

        <a-sky color="#87CEEB"></a-sky>

        <a-box class="clickable" static-body position="-5 2 -10" color="orange"></a-box>
        <a-box class="clickable" static-body position="5 2 -10" color="red"></a-box>

    </a-scene>
</body>
</html>
