<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gorilla Explorer VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      // GORILLA LOCOMOTION
      AFRAME.registerComponent('gorilla-move', {
        init: function () {
          this.el.addEventListener('click', (evt) => {
            const rig = document.querySelector('#rig');
            const camera = document.querySelector('#camera');
            const direction = new THREE.Vector3();
            camera.object3D.getWorldDirection(direction);
            
            // Fling logic
            rig.body.velocity.set(-direction.x * 6, 5, -direction.z * 6);
          });
        }
      });

      // IMMORTAL STALKER AI
      AFRAME.registerComponent('stalker-ai', {
        tick: function () {
          const player = document.querySelector('#rig').object3D.position;
          const monster = this.el.object3D;
          
          let dir = new THREE.Vector3().subVectors(player, monster.position).normalize();
          monster.position.addScaledVector(dir, 0.02); // Slightly slower stalker
          monster.lookAt(player);

          // REPEL LOGIC (Instead of Dying)
          if (monster.position.distanceTo(player) < 2) {
            // Push the monster back 15 units so it has to chase you again
            monster.position.addScaledVector(dir, -15);
            console.log("Monster repelled!");
          }
        }
      });
    </script>
</head>
<body style="margin: 0; background: #000;">

    <a-scene physics="gravity: -9.8" fog="type: exponential; color: #080808; density: 0.15">
        
        <a-entity id="rig" position="0 1.6 0" dynamic-body="mass: 1; shape: sphere">
            <a-camera id="camera" wasd-controls="enabled: false">
                <a-entity light="type: spot; intensity: 0.7; distance: 15; angle: 25" position="0.2 -0.2 0"></a-entity>
                <a-cursor color="cyan" raycaster="objects: .clickable" gorilla-move></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="monster" stalker-ai position="0 1 -25">
            <a-box width="1.2" height="3.5" depth="0.6" color="#000">
                <a-sphere color="#ff0000" radius="0.1" position="-0.2 1.2 0.3" material="emissive: red"></a-sphere>
                <a-sphere color="#ff0000" radius="0.1" position="0.2 1.2 0.3" material="emissive: red"></a-sphere>
            </a-box>
        </a-entity>

        <a-plane class="clickable" static-body rotation="-90 0 0" width="100" height="100" color="#111"></a-plane>
        
        <a-box class="clickable" static-body position="-8 3 -10" width="3" height="6" color="#1a1a1a"></a-box>
        <a-box class="clickable" static-body position="8 3 -15" width="3" height="6" color="#1a1a1a"></a-box>
        <a-box class="clickable" static-body position="0 3 12" width="4" height="6" color="#1a1a1a"></a-box>

        <a-sky color="#080808"></a-sky>
        <a-entity light="type: ambient; color: #222; intensity: 0.2"></a-entity>

    </a-scene>
</body>
</html>
